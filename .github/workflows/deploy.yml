# GitHub Actions workflow for Cloudflare Workers deployment
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:  # 手动触发

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Copy pre-rendered HTML to assets
        run: |
          mkdir -p .open-next/assets
          # Copy all pre-rendered HTML files preserving directory structure
          find .next/server/app -name "*.html" -exec cp --parents {} .open-next/assets/ \;
          # Copy 404 page
          if [ -f .next/server/app/_not-found.html ]; then
            cp .next/server/app/_not-found.html .open-next/assets/404.html
          fi
          echo "Pre-rendered HTML files copied"

      - name: Patch worker.js (static asset priority)
        run: |
          node -e "
          const fs = require('fs');
          let content = fs.readFileSync('.open-next/worker.js', 'utf-8');
          const marker = 'const response = maybeGetSkewProtectionResponse(request);';
          const patch = \`            // PATCH: static asset priority
            try {
                const url = new URL(request.url);
                let assetPath = url.pathname;
                if (assetPath === '/') assetPath = '/index.html';
                if (!assetPath.includes('.') && !assetPath.startsWith('/api') && !assetPath.startsWith('/_next')) {
                    assetPath += '.html';
                }
                const assetUrl = new URL(assetPath, request.url);
                const assetResp = await env.ASSETS?.fetch?.(new Request(assetUrl, request));
                if (assetResp && assetResp.status === 200) {
                    return assetResp;
                }
            } catch (e) {}
\${marker}\`;
          if (!content.includes('PATCH: static asset priority')) {
            fs.writeFileSync('.open-next/worker.js', content.replace(marker, patch));
            console.log('worker.js patched');
          } else {
            console.log('worker.js already patched');
          }
          "

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "."
          command: deploy --dry-run=false
