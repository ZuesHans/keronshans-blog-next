# GitHub Actions workflow for Cloudflare Workers deployment
# Requires secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Without secrets, this workflow will be skipped (no failure)
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run if Cloudflare secrets are configured
    if: vars.CLOUDFLARE_DEPLOY_ENABLED != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Copy pre-rendered HTML to assets
        run: |
          mkdir -p .open-next/assets
          find .next/server/app -name "*.html" -exec cp --parents {} .open-next/assets/ \;
          if [ -f .next/server/app/_not-found.html ]; then
            cp .next/server/app/_not-found.html .open-next/assets/404.html
          fi

      - name: Deploy to Cloudflare Workers
        if: secrets.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "."
          command: deploy --dry-run=false
